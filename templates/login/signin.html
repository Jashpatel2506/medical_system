<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | HealSmart - AI-Powered Health Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A2540;
            --secondary: #00D4FF;
            --accent: #5469FF;
            --text-dark: #1A1A1A;
            --text-light: #6B7280;
            --bg-light: #F9FAFB;
            --white: #FFFFFF;
            --success: #10B981;
            --error: #EF4444;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 3rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(84, 105, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-50px, 50px) scale(1.1);
            }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Signup Container */
        .signup-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.8s ease;
            margin: auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .signup-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, rgba(84, 105, 255, 0.1) 0%, rgba(0, 212, 255, 0.1) 100%);
            color: var(--accent);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .signup-badge::before {
            content: '✨';
            font-size: 1rem;
        }

        .signup-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 0.4rem;
            line-height: 1.2;
        }

        .signup-header .highlight {
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .signup-header p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* Form Styles */
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            padding-left: 2.6rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s;
            background: var(--white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(84, 105, 255, 0.1);
        }

        .form-input::placeholder {
            color: #9CA3AF;
        }

        .input-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--text-light);
            pointer-events: none;
        }

        .form-group.has-label .input-icon {
            top: calc(50% + 10px);
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-light);
            padding: 0.4rem;
            transition: color 0.3s;
        }

        .form-group.has-label .password-toggle {
            top: calc(50% + 10px);
        }

        .password-toggle:hover {
            color: var(--accent);
        }

        /* Role Selection */
        .role-group {
            margin-bottom: 1.5rem;
        }

        .role-group-label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .role-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .role-option {
            position: relative;
        }

        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .role-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.65rem 1.8rem;
            border: 2px solid var(--primary);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--white);
            color: var(--primary);
            min-width: 140px;
        }

        .role-label .role-icon {
            font-size: 1.1rem;
        }

        .role-option input[type="radio"]:checked + .role-label {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(10, 37, 64, 0.3);
        }

        .role-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(10, 37, 64, 0.2);
        }

        /* Gender Selection */
        .gender-options {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .gender-option {
            flex: 1;
            position: relative;
        }

        .gender-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .gender-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.7rem 0.5rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--white);
            color: var(--text-dark);
        }

        .gender-label .gender-icon {
            font-size: 1.5rem;
        }

        .gender-option input[type="radio"]:checked + .gender-label {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(84, 105, 255, 0.1) 0%, rgba(0, 212, 255, 0.05) 100%);
            color: var(--accent);
        }

        .gender-label:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* Textarea Styling */
        .form-textarea {
            padding-top: 0.75rem;
            padding-left: 0.9rem;
            resize: vertical;
            min-height: 60px;
            font-family: 'DM Sans', sans-serif;
        }

        /* Date Input Styling */
        input[type="date"].form-input {
            padding-left: 2.6rem;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary);
            color: var(--white);
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: transparent;
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(10, 37, 64, 0.2);
        }

        /* Login Link */
        .login-link {
            text-align: center;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #E5E7EB;
        }

        .login-link p {
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .login-link a:hover {
            opacity: 0.8;
        }

        /* Success Message */
        .success-message {
            display: none;
            padding: 0.65rem 0.85rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            border-radius: 8px;
            color: var(--success);
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 5rem 1rem 2rem;
            }

            .nav-container {
                padding: 1rem 1.5rem;
            }

            .nav-links {
                display: none;
            }

            .signup-card {
                padding: 1.5rem;
            }

            .signup-header h1 {
                font-size: 1.7rem;
            }

            .role-label {
                padding: 0.6rem 1.2rem;
                min-width: 120px;
                font-size: 0.85rem;
            }

            .gender-label {
                font-size: 0.8rem;
                padding: 0.6rem 0.3rem;
            }

            .gender-label .gender-icon {
                font-size: 1.3rem;
            }
        }

        /* Loading State */
        .btn-submit.loading {
            position: relative;
            color: transparent;
            pointer-events: none;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="home1.html" class="logo">Heal<span>Smart</span></a>
            <ul class="nav-links">
                <li><a href="home1.html">Home</a></li>
                <li><a href="login.html">Diagnosis</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Signup Container -->
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <div class="signup-badge">AI-Powered Health Intelligence</div>
                <h1>Create <span class="highlight">Account</span></h1>
                <p>Join us and start your health journey today</p>
            </div>

            {% if error %}
            <div id="serverErrorMessage" data-error="{{ error }}" style="display: none;"></div>
            {% endif %}

            <div class="success-message" id="successMessage">
                Account created successfully!
            </div>

            <form class="signup-form" method="POST" action="{% url 'signin' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="role-group">
                    <label class="role-group-label">I am a</label>
                    <div class="role-options">
                        <div class="role-option">
                            <input 
                                type="radio" 
                                id="patient" 
                                name="role" 
                                value="Patient" 
                                checked
                            >
                            <label for="patient" class="role-label">
                                <span class="role-icon">🏥</span>
                                <span>Patient</span>
                            </label>
                        </div>
                        <div class="role-option">
                            <input 
                                type="radio" 
                                id="doctor" 
                                name="role" 
                                value="Doctor"
                            >
                            <label for="doctor" class="role-label">
                                <span class="role-icon">⚕️</span>
                                <span>Doctor</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group has-label">
                    <label for="fullname" class="form-label">Full Name</label>
                    <span class="input-icon">👤</span>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="full_name" 
                        class="form-input" 
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group has-label">
                    <label for="email" class="form-label">Email Address</label>
                    <span class="input-icon">📧</span>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group has-label">
                    <label for="address" class="form-label">Address</label>
                    <span class="input-icon">📍</span>

                    
                    <textarea 
                        id="address" 
                        name="address" 
                        class="form-input form-textarea" 
                        placeholder="      Enter your address"
                        rows="2"
                        required
                    ></textarea>
                </div>

                <div class="form-group has-label">
                    <label for="phone" class="form-label">Phone Number</label>
                    <span class="input-icon">📱</span>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        class="form-input" 
                        placeholder="Enter your phone number"
                        minlength="10"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        title="Phone number must be exactly 10 digits"
                        required
                    >
                </div>

                <div class="form-group has-label">
                    <label for="birthdate" class="form-label">Birth Date</label>
                    <span class="input-icon">🎂</span>
                    <input 
                        type="date" 
                        id="birthdate" 
                        name="dob" 
                        class="form-input" 
                        required
                        max="{{ eighteen_years_ago }}"
                    >
                </div>

                <div class="form-group has-label">
                    <label class="form-label">Gender</label>
                    <div class="gender-options">
                        <div class="gender-option">
                            <input 
                                type="radio" 
                                id="male" 
                                name="gender" 
                                value="Male" 
                                required
                            >
                            <label for="male" class="gender-label">
                                <span class="gender-icon">👨</span>
                                <span>Male</span>
                            </label>
                        </div>
                        <div class="gender-option">
                            <input 
                                type="radio" 
                                id="female" 
                                name="gender" 
                                value="Female"
                            >
                            <label for="female" class="gender-label">
                                <span class="gender-icon">👩</span>
                                <span>Female</span>
                            </label>
                        </div>
                        <div class="gender-option">
                            <input 
                                type="radio" 
                                id="other" 
                                name="gender" 
                                value="Other"
                            >
                            <label for="other" class="gender-label">
                                <span class="gender-icon">⚧</span>
                                <span>Other</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div id="doctor-fields" style="display: none; flex-direction: column; gap: 1rem;">
                    <div class="form-group has-label">
                        <label for="certificate" class="form-label">Medical Certificate (PDF/Image)</label>
                        <span class="input-icon">📜</span>
                        <input 
                            type="file" 
                            id="certificate" 
                            name="certificate_file" 
                            class="form-input" 
                            accept=".pdf,image/*"
                            style="padding-top: 0.5rem;"
                        >
                    </div>
                    <div class="form-group has-label">
                        <label for="license" class="form-label">Medical License (PDF/Image)</label>
                        <span class="input-icon">🏥</span>
                        <input 
                            type="file" 
                            id="license" 
                            name="license_file" 
                            class="form-input" 
                            accept=".pdf,image/*"
                            style="padding-top: 0.5rem;"
                        >
                    </div>
                </div>

                <div class="form-group has-label">
                    <label for="password" class="form-label">Password</label>
                    <span class="input-icon">🔒</span>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Create a password"
                        minlength="8"
                        required
                    >
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-closed" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>

                <div class="form-group has-label">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <span class="input-icon">🔒</span>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="Re-enter your password"
                        minlength="8"
                        required
                    >
                    <button type="button" class="password-toggle" id="toggleConfirmPassword">
                        <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-closed" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
            </div>
        </div>
    </div>

    <script>
        // Role Toggle
        const patientRadio = document.getElementById('patient');
        const doctorRadio = document.getElementById('doctor');
        const doctorFields = document.getElementById('doctor-fields');
        const certInput = document.getElementById('certificate');
        const licenseInput = document.getElementById('license');

        function toggleDoctorFields() {
            if (doctorRadio.checked) {
                doctorFields.style.display = 'flex';
                certInput.required = true;
                licenseInput.required = true;
            } else {
                doctorFields.style.display = 'none';
                certInput.required = false;
                licenseInput.required = false;
            }
        }

        patientRadio.addEventListener('change', toggleDoctorFields);
        doctorRadio.addEventListener('change', toggleDoctorFields);
        toggleDoctorFields(); // Initialize on load
        
        // Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const eyeOpen = this.querySelector('.eye-open');
            const eyeClosed = this.querySelector('.eye-closed');
            
            if (type === 'password') {
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            } else {
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            }
        });

        // Confirm Password Toggle
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            
            const eyeOpen = this.querySelector('.eye-open');
            const eyeClosed = this.querySelector('.eye-closed');
            
            if (type === 'password') {
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            } else {
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            }
        });

        // Handle Server-side errors via bubbles
        const serverErrorDiv = document.getElementById('serverErrorMessage');
        if (serverErrorDiv) {
            const errorMsg = serverErrorDiv.getAttribute('data-error');
            if (errorMsg) {
                // Try to find the most relevant field
                let targetInput = document.getElementById('email'); // Default
                if (errorMsg.toLowerCase().includes('phone')) targetInput = document.getElementById('phone');
                if (errorMsg.toLowerCase().includes('password')) targetInput = document.getElementById('password');
                if (errorMsg.toLowerCase().includes('age') || errorMsg.toLowerCase().includes('birth')) targetInput = document.getElementById('birthdate');
                
                targetInput.setCustomValidity(errorMsg);
                targetInput.reportValidity();
            }
        }

        // Form Submission - Validations
        const signupForm = document.querySelector('.signup-form');
        signupForm.addEventListener('submit', function(e) {
            // Reset custom validities
            document.querySelectorAll('.form-input').forEach(input => input.setCustomValidity(''));

            // Phone validation
            const phoneInput = document.getElementById('phone');
            const phone = phoneInput.value.replace(/\D/g, '');
            if (phone.length < 10) {
                phoneInput.setCustomValidity('⚠️ Phone number must be at least 10 digits!');
                phoneInput.reportValidity();
                e.preventDefault();
                return false;
            }

            // Password Match validation
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (password !== confirmPassword) {
                confirmPasswordInput.setCustomValidity("⚠️ Passwords do not match!");
                confirmPasswordInput.reportValidity();
                e.preventDefault();
                return false;
            }

            // Password Complexity validation
            const complexityRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;
            if (!complexityRegex.test(password)) {
                passwordInput.setCustomValidity("⚠️ Password must be at least 8 characters long and contain at least one letter, one number, and one special character!");
                passwordInput.reportValidity();
                e.preventDefault();
                return false;
            }

            // Age validation (18+)
            const birthdateInput = document.getElementById('birthdate');
            const dob = new Date(birthdateInput.value);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            if (age < 18) {
                birthdateInput.setCustomValidity("⚠️ You must be at least 18 years old to register!");
                birthdateInput.reportValidity();
                e.preventDefault();
                return false;
            }
        });

        // Clear custom validity on input
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                this.setCustomValidity('');
            });
        });
        

        // Add floating animation to form inputs on focus
        const formInputs = document.querySelectorAll('.form-input');
        formInputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });

        // Phone number formatting (basic)
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            // Remove all non-numeric characters
            let value = e.target.value.replace(/\D/g, '');
            // Limit to 10 digits
            value = value.substring(0, 10);
            e.target.value = value;
        });
    </script>
</body>
</html>
