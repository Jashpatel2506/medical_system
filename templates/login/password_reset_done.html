<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | HealSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0A2540; --accent: #5469FF; --text-light: #6B7280; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 5rem 2rem 2rem;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 1.2rem 3rem; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }
        .card {
            background: white; border-radius: 20px; padding: 3rem 2.5rem;
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-wrap {
            width: 80px; height: 80px; margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(0,212,255,0.1));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 1rem; }
        p { color: var(--text-light); font-size: 0.9rem; line-height: 1.7; margin-bottom: 0.5rem; }
        .btn {
            display: inline-block; margin-top: 1.5rem; padding: 0.85rem 2.5rem;
            background: var(--primary); color: white; border-radius: 10px;
            text-decoration: none; font-weight: 600; font-size: 0.9rem;
            border: 2px solid var(--primary); transition: all 0.3s;
        }
        .btn:hover { background: transparent; color: var(--primary); }
        .note { margin-top: 1rem; font-size: 0.8rem; color: var(--text-light); font-style: italic; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">Heal<span>Smart</span></a>
        </div>
    </nav>

    <div class="card">
        <div class="icon-wrap">📬</div>
        <h1>Check Your Email</h1>
        <p>We've sent a password reset link to your email address.</p>
        <p>Click the link in the email to reset your password.</p>
        <a href="{% url 'login' %}" class="btn">Back to Login</a>
        <p class="note">⚠️ Didn't receive it? Check your spam/junk folder.</p>
    </div>
</body>
</html>
