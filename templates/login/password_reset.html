<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | HealSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0A2540; --accent: #5469FF;
            --text-dark: #1A1A1A; --text-light: #6B7280; --white: #FFFFFF;
            --error: #EF4444; --success: #10B981;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            padding: 5rem 2rem 2rem;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto;
            padding: 1.2rem 3rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }
        .card {
            background: white; border-radius: 20px; padding: 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-header { text-align: center; margin-bottom: 2rem; }
        .icon-wrap {
            width: 70px; height: 70px; margin: 0 auto 1rem;
            background: linear-gradient(135deg, rgba(84,105,255,0.1), rgba(0,212,255,0.1));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif; font-size: 1.8rem;
            color: var(--primary); margin-bottom: 0.5rem;
        }
        .subtitle { color: var(--text-light); font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-dark); }
        input[type="email"] {
            width: 100%; padding: 0.8rem 1rem;
            border: 2px solid #E5E7EB; border-radius: 10px;
            font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
            transition: all 0.3s; background: white;
        }
        .alert-danger {
            background: rgba(239,68,68,0.1); border: 1px solid var(--error);
            color: var(--error); padding: 0.75rem 1rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success);
            color: var(--success); padding: 0.75rem 1rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        input[type="email"]:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(84,105,255,0.1);
        }
        input[type="email"]::placeholder { color: #9CA3AF; }
        .btn {
            width: 100%; padding: 0.85rem;
            background: var(--primary); color: white;
            border: 2px solid var(--primary); border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            font-family: 'DM Sans', sans-serif; transition: all 0.3s; margin-top: 0.5rem;
        }
        .btn:hover {
            background: transparent; color: var(--primary);
            transform: translateY(-2px); box-shadow: 0 10px 30px rgba(10,37,64,0.2);
        }
        .back-link { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #E5E7EB; }
        .back-link a { color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
        .back-link a:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">Heal<span>Smart</span></a>
        </div>
    </nav>

    <div class="card">
        <div class="card-header">
            <div class="icon-wrap">🔐</div>
            <h1>Forgot Password?</h1>
            <p class="subtitle">Enter your registered email and we'll send you a reset link.</p>
        </div>

        {% if error %}
        <div class="alert-danger">
            {{ error }}
        </div>
        {% endif %}

        {% if success_msg %}
        <div class="alert-success">
            {{ success_msg }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email"
                       placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn">📧 Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>
</body>
</html>
